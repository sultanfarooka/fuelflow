<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        const theme = localStorage.getItem('fuel-flow-ui-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolved = theme === 'system' ? (systemDark ? 'dark' : 'light') : (theme || 'light');
        document.documentElement.classList.add(resolved);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/app-icon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="theme-color" content="#ca3500" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuel Flow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
