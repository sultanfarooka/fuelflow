# Single-origin server: serves the built SPA and reverse-proxies /api → backend.
# Installed at /etc/nginx/conf.d/default.conf (inside the http{} block of the base image).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ────────────────────────────────────────
    # No trailing path on proxy_pass → the full original URI (/api/v1/...) is
    # forwarded unchanged to the backend, whose controllers are routed at /api/v1/...
    # Same-origin to the browser → HTTP-only auth cookies work and no CORS is needed.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Cache policy ─────────────────────────────────────────────
    # Hashed build assets are immutable and can be cached forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker, manifest, and the shell must revalidate so updates roll out
    # promptly (PWA registerType is autoUpdate).
    location = /sw.js            { add_header Cache-Control "no-cache"; }
    location = /registerSW.js    { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /index.html       { add_header Cache-Control "no-cache"; }

    # ── SPA fallback ─────────────────────────────────────────────
    # TanStack Router deep links (e.g. /dashboard/stations/123) resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
